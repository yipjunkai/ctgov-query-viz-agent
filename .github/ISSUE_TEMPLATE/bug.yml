name: Bug report
description: Wrong output, a crash, or a build/run problem.
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One sentence describing the bug.
    validations:
      required: true
  - type: textarea
    id: request
    attributes:
      label: Request
      description: The exact `POST /visualize` request body that reproduces it.
      render: json
      placeholder: |
        {"query": "How are melanoma trials distributed across phases?", "condition": "melanoma"}
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual response
      description: The JSON the service returned (or the error / traceback).
      render: json
    validations:
      required: true
  - type: input
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: e.g. commit 1de65d7
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: e.g. 3.12.5
    validations:
      required: true
  - type: dropdown
    id: planner
    attributes:
      label: Planner in use
      options:
        - "No key (rule-based fallback)"
        - "LLM planner (OpenRouter/OpenAI)"
        - "Not sure"
    validations:
      required: true
