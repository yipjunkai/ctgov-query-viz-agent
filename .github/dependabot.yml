# Automated dependency updates (OpenSSF Scorecard: Dependency-Update-Tool).
version: 2
updates:
  # Python packages — native uv ecosystem (reads pyproject.toml + uv.lock).
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # GitHub Actions — keeps the pinned action SHAs current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
